name: Deploy

# Manual trigger only — distributing a build is a deliberate action, not
# something that should happen on every push. See README's "CI/CD" section
# for the full list of secrets each job needs.
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes shown to testers"
        required: false
        default: "Automated build from CI"

jobs:
  deploy-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.8"
          channel: "stable"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Restore Android signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/dutuku-upload-keystore.jks

      - name: Restore google-services.json
        run: echo "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=dutuku-upload-keystore.jks
          EOF

      - name: Restore dart-define env file
        env:
          ENV_JSON_B64: ${{ secrets.ENV_DART_DEFINE_JSON_BASE64 }}
        run: |
          if [ -n "$ENV_JSON_B64" ]; then
            mkdir -p env
            echo "$ENV_JSON_B64" | base64 --decode > env/dev.json
            echo "DART_DEFINE_FILE=env/dev.json" >> "$GITHUB_ENV"
          fi

      - name: Restore Firebase service account
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Distribute via Fastlane
        working-directory: android
        env:
          FIREBASE_DISTRIBUTION_GROUPS: ${{ vars.FIREBASE_DISTRIBUTION_GROUPS }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: bundle exec fastlane android firebase_distribute

  deploy-ios:
    # Opt-in: flip the `IOS_DEPLOY_ENABLED` repo variable to `true` once the
    # Apple signing secrets below are configured. Left off by default so this
    # workflow doesn't fail for forks/clones that only care about Android.
    if: ${{ vars.IOS_DEPLOY_ENABLED == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.8"
          channel: "stable"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Restore GoogleService-Info.plist
        run: echo "${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Restore dart-define env file
        env:
          ENV_JSON_B64: ${{ secrets.ENV_DART_DEFINE_JSON_BASE64 }}
        run: |
          if [ -n "$ENV_JSON_B64" ]; then
            mkdir -p env
            echo "$ENV_JSON_B64" | base64 --decode > env/dev.json
            echo "DART_DEFINE_FILE=env/dev.json" >> "$GITHUB_ENV"
          fi

      - name: Restore Firebase service account
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Import signing certificate & provisioning profile
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Distribute via Fastlane
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
          FIREBASE_DISTRIBUTION_GROUPS: ${{ vars.FIREBASE_DISTRIBUTION_GROUPS }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: bundle exec fastlane ios firebase_distribute
