name: dutuku_workspace

packages:
  - .
  - packages/*

command:
  bootstrap:
    runPubGetInParallel: true

# melos is a dev dependency (not globally activated), so scripts invoke it
# through `dart run melos exec` instead of the bare `melos` binary.
scripts:
  setup:
    description: >-
      One-shot project setup — checks out submodules, deep cleans, runs pub
      get in every package, then all code generation. `dart run` resolves
      dependencies implicitly, so this works right after a
      `--recurse-submodules` clone with no manual pub get.
    run: >-
      git submodule update --init --recursive &&
      git submodule foreach --recursive "git checkout main && git pull --ff-only origin main" &&
      dart run melos run clean:deep &&
      dart run melos bootstrap &&
      dart run melos run gen:all

  analyze:
    description: Run flutter analyze in every package.
    run: dart run melos exec --concurrency=1 -- "flutter analyze ."

  test:
    description: Run tests in every package that has a test/ directory.
    run: dart run melos exec --concurrency=1 --dir-exists=test -- "flutter test"

  format:
    description: Format all packages.
    run: dart run melos exec -- "dart format ."

  format:check:
    description: Fail if any file is not formatted (used by CI).
    run: dart run melos exec -- "dart format --set-exit-if-changed ."

  gen:l10n:
    description: Generate localizations (app only).
    run: dart run melos exec --scope=dutuku_e_commerce -- "flutter gen-l10n"

  gen:build:
    description: Run build_runner in packages that depend on it.
    run: dart run melos exec --depends-on=build_runner -- "dart run build_runner build --delete-conflicting-outputs"

  gen:all:
    description: Run all code generation (l10n + build_runner).
    run: dart run melos run gen:l10n && dart run melos run gen:build

  clean:flutter:
    description: flutter clean in every package.
    run: dart run melos exec --concurrency=1 -- "flutter clean"

  clean:deep:
    description: >-
      Deep clean — flutter clean in every package and remove iOS Pods
      artifacts (Podfile.lock is regenerated by the next pod install /
      flutter run).
    run: >-
      dart run melos run clean:flutter &&
      rm -rf ios/Pods ios/Podfile.lock
